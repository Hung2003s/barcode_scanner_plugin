name: barcode_scanner_plugin
description: "A federated Flutter plugin to scan barcodes from hardware PDA devices via Android Broadcast Intents and EventChannel stream."
version: 0.0.1
homepage:
repository: https://github.com/pda_scanner_lmhung/barcode_scanner_plugin
environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  plugin:
    platforms:
      android:
        package: com.pda_scanner_lmhung.barcode_scanner_plugin
        pluginClass: BarcodeScannerPlugin
      ios:
        pluginClass: BarcodeScannerPlugin

