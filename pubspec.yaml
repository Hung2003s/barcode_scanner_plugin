name: barcode_scanner_plugin
description: "A powerful Flutter plugin for dual-mode barcode scanning. Supports dedicated PDA hardware via Broadcast Intents and smartphone cameras using CameraX and Google ML Kit."
version: 0.1.5
repository: https://github.com/Hung2003s/barcode_scanner_plugin.git
topics:
  - barcode
  - scanner
  - camera
  - pda
  - qr-code
environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  plugin:
    platforms:
      android:
        package: com.pda_scanner_lmhung.barcode_scanner_plugin
        pluginClass: BarcodeScannerPlugin
      ios:
        pluginClass: BarcodeScannerPlugin
